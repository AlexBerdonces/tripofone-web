<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripOfOne — Your city, your trip, your way</title>
  <meta name="description" content="TripOfOne is the AI companion that knows your taste. Hyper-personalized recommendations in your city and on every trip.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1b2a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #ffb703;
      margin-bottom: 48px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1.15;
      max-width: 750px;
      margin-bottom: 24px;
    }
    h1 span { color: #ffb703; }
    p.tagline {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: #cfd8e3;
      max-width: 600px;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .cta {
      display: inline-block;
      background: #ffb703;
      color: #0d1b2a;
      font-weight: 700;
      font-size: 1.05rem;
      padding: 14px 36px;
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.15s ease;
    }
    .cta:hover { transform: scale(1.05); }
    footer {
      margin-top: 64px;
      font-size: 0.85rem;
      color: #6b7a8c;
    }
  </style>
</head>
<body>
  <div class="logo">TripOfOne</div>
  <h1>A million things to do.<br>We find <span>the one for you.</span></h1>
  <p class="tagline">
    TripOfOne is the AI companion that truly knows your taste.
    Hyper-personalized plans in your own city — and on every trip you take.
    Coming soon.
  </p>
  <a class="cta" href="mailto:hello@tripofone.com">Get early access</a>
  <footer>© 2026 TripOfOne · Barcelona</footer>
</body>
</html>
